stages:
  - test
  - deploy

# Sintaksis tekshiruvi
test:
  stage: test
  image: python:3.11-slim
  cache:
    paths:
      - .cache/pip/
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - pip install -r requirements.txt
    - python -c "import ast; ast.parse(open('bot.py', encoding='utf-8').read()); print('✅ Syntax OK')"
  only:
    - master

# Railway ga avtomatik deploy
deploy:
  stage: deploy
  image: node:18-slim
  script:
    - npm install -g @railway/cli
    - railway up --detach --service imposter-bot
  only:
    - master
  environment:
    name: production
